<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pints Tracker</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:24px}
    table{border-collapse:collapse;width:100%;max-width:800px}
    th,td{padding:8px;border:1px solid #ddd;text-align:left}
  </style>
</head>
<body>
  <h1>Pints Tracker</h1>
  <div id="last-updated"></div>
  <h2>At A Glance</h2>
  <div id="total-pints"></div>
  <table id="totals">
  <p>Biggest gimp (15 pint penalty): Tom Swithenbank</p>
    <thead><tr><th>Participant</th><th>Pints</th><th>Hattricks</th><th>Away Goals</th></tr></thead>
    <tbody></tbody>
  </table>
  <h2>Pints over time</h2>
  <div id="race-wrap" style="margin:24px 0;max-width:800px">
  <h2 style="margin:0 0 8px;font-size:1.1em">Pints over time</h2>
  <canvas id="race-canvas" width="800" height="420" style="width:100%;border:1px solid #ddd"></canvas>
  <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
    <button id="race-play" type="button">Play</button>
    <input id="race-scrub" type="range" min="0" max="0" value="0" style="flex:1">
    <span id="race-date" style="font-size:0.85em;color:#555;min-width:9em;text-align:right"></span>
  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
